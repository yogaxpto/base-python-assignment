name: Main Workflow

on:
  push:

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Build
        uses: ./.github/actions/build

  Validate:
    runs-on: ubuntu-latest
    needs: Build

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Validate
        uses: ./.github/actions/validate

  Test:
    runs-on: ubuntu-latest
    needs: Validate

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Test
        uses: ./.github/actions/test

  Deploy:
    runs-on: ubuntu-latest
    needs: Test

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Deploy to pre-production
        uses: ./.github/actions/deploy
        with:
          environment: production