name: Main Workflow

on:
  push:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Build
        uses: actions/checkout@v2

      - name: Validate
        needs: Build
        run: npm run build

      - name: Test
        needs: Validate
        run: npm run test

      - name: Deploy to pre-production
        needs: Test
        uses: ./.github/actions/deploy
        with:
          environment: production