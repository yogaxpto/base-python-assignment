name: Main Workflow

on:
  push:

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Build
        uses: actions/checkout@v2

  Validate:
    runs-on: ubuntu-latest
    needs: Build

    steps:
      - name: Validate
        run: npm run build

  Test:
    runs-on: ubuntu-latest
    needs: Validate

    steps:
      - name: Test
        run: npm run test

  Deploy:
    runs-on: ubuntu-latest
    needs: Test

    steps:
      - name: Deploy to pre-production
        uses: ./.github/actions/deploy
        with:
          environment: production